name: Deploy to Cloud Run

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # TODO: Add this secret to your repo
  REGION: europe-west4 # Netherlands (better domain mapping support)
  GAR_LOCATION: europe-west4 # Netherlands
  REPOSITORY: quillsocial-images # TODO: Create this Artifact Registry repository
  IMAGE_NAME: quillsocial-web
  SERVICE_NAME: quillsocial-web
  JOB_NAME: quillsocial-web-migrate
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: corepack enable && YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Generate Prisma Client
        run: yarn workspace @quillsocial/prisma generate-schemas

      - name: Build Web Application
        run: yarn build
        env:
          NEXTAUTH_SECRET: "build-time-dummy-secret"
          MY_APP_ENCRYPTION_KEY: "build-time-dummy-encryption-key-32chars!"
          NEXTAUTH_URL: "http://localhost:3000/api/auth"
          NEXT_PUBLIC_WEBAPP_URL: "http://localhost:3000"

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show Authenticated Account
        run: gcloud config list account

      - name: Login to Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --port 3000 \
            --allow-unauthenticated \
            --cpu 0.5 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars NODE_ENV=production

      - name: Run DB migrations (Cloud Run job)
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          # Note: Adjust the migration command based on whether your final image contains the prisma CLI.
          if gcloud run jobs describe "${{ env.JOB_NAME }}" --region "${{ env.REGION }}" >/dev/null 2>&1; then
            gcloud run jobs update "${{ env.JOB_NAME }}" \
              --region "${{ env.REGION }}" \
              --image "$IMAGE" \
              --command "sh" \
              --args "-c,npx prisma migrate deploy" \
              --memory "1Gi" \
              --set-env-vars "NODE_ENV=production,DATABASE_URL=${{ env.DATABASE_URL }}"
          else
            gcloud run jobs create "${{ env.JOB_NAME }}" \
              --region "${{ env.REGION }}" \
              --image "$IMAGE" \
              --command "sh" \
              --args "-c,npx prisma migrate deploy" \
              --memory "1Gi" \
              --set-env-vars "NODE_ENV=production,DATABASE_URL=${{ env.DATABASE_URL }}"
          fi

          gcloud run jobs execute "${{ env.JOB_NAME }}" --region "${{ env.REGION }}" --wait
